name: Feature request
description: Propose a bounded product, tooling, or documentation improvement
title: "[Feature]: "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the requested behavior or deliverable.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note any security, protocol, operational, documentation, or user impact.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require a protocol semantics change. If it does, use the protocol proposal template.
          required: true